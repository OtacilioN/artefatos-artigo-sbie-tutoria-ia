name: Reproduce downstream analysis

on:
  push:
  pull_request:

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Validate analysis
        run: python scripts/reproduce_analysis.py
      - name: Regenerate figures
        run: python scripts/regenerate_figures.py

  classifier-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validator dependencies
        run: python -m pip install numpy==2.3.4 pandas==2.3.3
      - name: Validate classifier source
        run: |
          python -m py_compile classifier/*.py
          sh -n classifier/run_full_classifier.sh
          sh -n classifier/setup_macos.sh
          PYTHONPATH=classifier python -m unittest classifier/tests/test_contract_light.py -v
          PYTHONPATH=classifier python -m unittest classifier/tests/test_validate_outputs.py -v
